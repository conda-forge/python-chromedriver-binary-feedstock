# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "152.0.7950.0.0"
  chromedriver_version: ${{ (version | split("."))[0:4] | join(".") }}
  python_check_max: "3.14"

package:
  name: python-chromedriver-binary
  version: ${{ version }}

source:
  - url: https://github.com/danielkaiser/python-chromedriver-binary/archive/v${{ version }}.tar.gz
    sha256: 668f5bddd795b5bf41ada5d2dc1f42ddc2de77c8aaf08801909a9f8fb3129c7e
  - if: target_platform == "linux-64"
    then:
      url: https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${{ chromedriver_version }}/linux64/chromedriver-linux64.zip
      sha256: a8880b2408a5654acb3bacc4398b0ed3c996de84eed3a76433fc9b3aeb814318
  - if: target_platform == "osx-64"
    then:
      url: https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${{ chromedriver_version }}/mac-x64/chromedriver-mac-x64.zip
      sha256: e54993196f9be340c7d099cf4daf2a72b441df8e274061338138ebe13d198f4c
  - if: target_platform == "osx-arm64"
    then:
      url: https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${{ chromedriver_version }}/mac-arm64/chromedriver-mac-arm64.zip
      sha256: ce026ff627f5e2330b58d1e143b7386330a16b3b598435e86b69ddd978837fea
  - if: target_platform == "win-64"
    then:
      url: https://edgedl.me.gvt1.com/edgedl/chrome/chrome-for-testing/${{ chromedriver_version }}/win32/chromedriver-win32.zip
      sha256: 45a7c19c565cc7ceaf2ea861b27cbb34f01bb4efb59b3f187557f8935e88314a

build:
  number: 0
  dynamic_linking:
    binary_relocation: ${{ not osx }}
  python:
    version_independent: true
    entry_points:
      - chromedriver-path = chromedriver_binary.utils:print_chromedriver_path
  script:
    - if: not win
      then:
        - chmod +x chromedriver
      else:
        # see https://conda-forge.zulipchat.com/#narrow/channel/457337-general/topic/.60pip.20install.60.20failing.20on.20Windows.20today/with/603912616
        - set PIP_USE_DEPRECATED=legacy-certs
        - set PYTHONHASHSEED=0
    - ${{ PYTHON }} -m pip install . -vv --no-deps --no-build-isolation --disable-pip-version-check

requirements:
  host:
    - pip
    - python ${{ python_min }}.*
    - setuptools
  run:
    - python >=${{ python_min }}

tests:
  - python:
      imports: chromedriver_binary
      pip_check: true
      python_version:
        - ${{ python_min }}.*
        - ${{ python_check_max }}.*
  - requirements:
      run:
        - python ${{ python_min }}.*
    script:
      file: run_test.py

about:
  homepage: https://pypi.org/project/chromedriver-binary
  repository: https://github.com/danielkaiser/python-chromedriver-binary
  license: MIT
  license_file:
    - LICENSE
    - LICENSE.chromedriver
    - THIRD_PARTY_NOTICES.chromedriver
  summary: Downloads and installs the chromedriver binary version
  description: |
    Downloads and installs the chromedriver binary for automated
    testing of webapps. The installer supports Linux, MacOS and Windows
    operating systems.

extra:
  recipe-maintainers:
    - williamjamir
    - bollwyvl
